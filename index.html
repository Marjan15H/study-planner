<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Planner PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
  <h1>🚀 Study Planner PRO</h1>
  <div class="header-right">
    <input type="text" id="search" placeholder="Search..." onkeyup="searchTask()">
    <button id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
  </div>
</header>

<!-- TASK -->
<div class="input-box">
  <input id="taskInput" placeholder="New Task">
  <input type="date" id="taskDate">
  <select id="taskCategory">
    <option value="Study">Study</option>
    <option value="Assignment">Assignment</option>
    <option value="Exam">Exam</option>
    <option value="Personal">Personal</option>
    <option value="Other">Other</option>
  </select>
  <select id="taskPriority">
    <option value="High">🔥 High</option>
    <option value="Medium">⚡ Medium</option>
    <option value="Low">🍃 Low</option>
  </select>
  <button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<div class="progress-box">
  <div id="progress"></div>
</div>

<p>✅ Completed: <span id="completedCount">0</span></p>
<p>🔥 Streak: <span id="streakCount">0</span></p>

<hr>

<!-- FOCUS MODE -->
<h2>⏱ Focus Mode</h2>
<div class="timer">
  <select id="timerDuration">
    <option value="5">5 min</option>
    <option value="10">10 min</option>
    <option value="15">15 min</option>
    <option value="25" selected>25 min</option>
    <option value="30">30 min</option>
    <option value="45">45 min</option>
    <option value="60">60 min</option>
  </select>
  <h2 id="timerDisplay">25:00</h2>
  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>
</div>

<hr>

<!-- NOTES -->
<h2>🧠 Smart Notes</h2>
<input id="noteTitle" placeholder="Title">
<textarea id="noteText" placeholder="Write your note..."></textarea>
<button onclick="addNote()">Save Note</button>
<input type="text" id="noteSearch" placeholder="Search notes..." onkeyup="searchNotes()">

<div id="notes"></div>

<hr>

<!-- FILE -->
<h2>📂 Upload PDF</h2>
<input type="file" id="fileInput" accept=".pdf">

<!-- MODE SELECT -->
<h3>Choose Mode</h3>
<div class="mode-select">
  <button onclick="setMode('notes')" class="active-mode">🧠 Notes</button>
  <button onclick="setMode('quiz')">❓ Quiz</button>
</div>

<button onclick="processFile()">Generate</button>

<div id="output"></div>

<h3>📊 Score: <span id="score">0</span></h3>

<button onclick="saveGeneratedNotes()">💾 Save Notes</button>
<button onclick="downloadGeneratedPDF()">📄 Download PDF</button>

<hr>

<button onclick="exportData()">📤 Export</button>
<button onclick="clearData()">🗑 Clear</button>

</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
