<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Planner PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LEFT SIDE ILLUSTRATION -->
<div class="side-art left-art" aria-hidden="true">
  <svg viewBox="0 0 300 800" xmlns="http://www.w3.org/2000/svg">
    <!-- shelf -->
    <rect x="40" y="560" width="180" height="10" rx="3" class="art-navy"/>
    <!-- books -->
    <rect x="50" y="470" width="28" height="90" class="art-navy"/>
    <rect x="82" y="440" width="28" height="120" class="art-gold"/>
    <rect x="114" y="490" width="28" height="70" class="art-navy"/>
    <rect x="146" y="455" width="28" height="105" class="art-gold"/>
    <!-- graduation cap -->
    <polygon points="130,300 210,335 130,370 50,335" class="art-navy"/>
    <rect x="122" y="335" width="16" height="40" class="art-navy"/>
    <circle cx="130" cy="375" r="6" class="art-gold"/>
    <!-- floating circles -->
    <circle cx="220" cy="200" r="16" class="art-gold" opacity="0.7"/>
    <circle cx="60" cy="150" r="10" class="art-navy" opacity="0.6"/>
    <circle cx="240" cy="620" r="12" class="art-navy" opacity="0.5"/>
    <!-- pencil -->
    <rect x="180" y="120" width="14" height="120" rx="4" transform="rotate(25 187 180)" class="art-gold"/>
  </svg>
</div>

<!-- RIGHT SIDE ILLUSTRATION -->
<div class="side-art right-art" aria-hidden="true">
  <svg viewBox="0 0 300 800" xmlns="http://www.w3.org/2000/svg">
    <!-- lightbulb -->
    <circle cx="150" cy="180" r="46" class="art-gold"/>
    <rect x="132" y="222" width="36" height="22" rx="4" class="art-navy"/>
    <line x1="150" y1="110" x2="150" y2="90" stroke-width="6" class="art-stroke-gold"/>
    <line x1="100" y1="140" x2="82" y2="122" stroke-width="6" class="art-stroke-gold"/>
    <line x1="200" y1="140" x2="218" y2="122" stroke-width="6" class="art-stroke-gold"/>
    <!-- gear -->
    <circle cx="120" cy="420" r="34" class="art-navy"/>
    <circle cx="120" cy="420" r="14" class="art-gold"/>
    <g class="art-navy">
      <rect x="112" y="374" width="16" height="18"/>
      <rect x="112" y="450" width="16" height="18"/>
      <rect x="74" y="412" width="18" height="16"/>
      <rect x="150" y="412" width="18" height="16"/>
    </g>
    <!-- laptop -->
    <rect x="60" y="560" width="160" height="100" rx="8" class="art-navy"/>
    <rect x="72" y="572" width="136" height="76" class="art-gold" opacity="0.85"/>
    <rect x="40" y="660" width="220" height="14" rx="6" class="art-navy"/>
    <!-- atom orbit -->
    <ellipse cx="220" cy="300" rx="40" ry="14" class="art-stroke-navy" fill="none" stroke-width="4" transform="rotate(30 220 300)"/>
    <ellipse cx="220" cy="300" rx="40" ry="14" class="art-stroke-navy" fill="none" stroke-width="4" transform="rotate(-30 220 300)"/>
    <circle cx="220" cy="300" r="8" class="art-gold"/>
  </svg>
</div>

<div class="container">

<header>
  <h1>🚀 Study Planner PRO</h1>
  <div class="header-right">
    <input type="text" id="search" placeholder="Search..." onkeyup="searchTask()">
    <button id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
  </div>
</header>

<!-- TASK -->
<div class="input-box">
  <input id="taskInput" placeholder="New Task">
  <input type="date" id="taskDate">
  <select id="taskCategory">
    <option value="Study">Study</option>
    <option value="Assignment">Assignment</option>
    <option value="Exam">Exam</option>
    <option value="Personal">Personal</option>
    <option value="Other">Other</option>
  </select>
  <select id="taskPriority">
    <option value="High">🔥 High</option>
    <option value="Medium">⚡ Medium</option>
    <option value="Low">🍃 Low</option>
  </select>
  <button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<div class="progress-box">
  <div id="progress"></div>
</div>

<p>✅ Completed: <span id="completedCount">0</span></p>
<p>🔥 Streak: <span id="streakCount">0</span></p>

<hr>

<!-- FOCUS MODE -->
<h2>⏱ Focus Mode</h2>
<div class="timer">
  <select id="timerDuration">
    <option value="5">5 min</option>
    <option value="10">10 min</option>
    <option value="15">15 min</option>
    <option value="25" selected>25 min</option>
    <option value="30">30 min</option>
    <option value="45">45 min</option>
    <option value="60">60 min</option>
  </select>
  <h2 id="timerDisplay">25:00</h2>
  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>
</div>

<hr>

<!-- NOTES -->
<h2>🧠 Smart Notes</h2>
<input id="noteTitle" placeholder="Title">
<textarea id="noteText" placeholder="Write your note..."></textarea>
<button onclick="addNote()">Save Note</button>
<input type="text" id="noteSearch" placeholder="Search notes..." onkeyup="searchNotes()">

<div id="notes"></div>

<hr>

<!-- FILE -->
<h2>📂 Upload PDF</h2>
<input type="file" id="fileInput" accept=".pdf">

<!-- MODE SELECT -->
<h3>Choose Mode</h3>
<div class="mode-select">
  <button onclick="setMode('notes')" class="active-mode">🧠 Notes</button>
  <button onclick="setMode('quiz')">❓ Quiz</button>
</div>

<button onclick="processFile()">Generate</button>

<div id="output"></div>

<h3>📊 Score: <span id="score">0</span></h3>

<button onclick="saveGeneratedNotes()">💾 Save Notes</button>
<button onclick="downloadGeneratedPDF()">📄 Download PDF</button>

<hr>

<button onclick="exportData()">📤 Export</button>
<button onclick="clearData()">🗑 Clear</button>

</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
