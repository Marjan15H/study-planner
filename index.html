<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Planner PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
  <h1>🚀 Study Planner PRO</h1>
  <input type="text" id="search" placeholder="Search..." onkeyup="searchTask()">
</header>

<!-- TASK -->
<div class="input-box">
  <input id="taskInput" placeholder="New Task">
  <button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<hr>

<!-- NOTES -->
<h2>🧠 Smart Notes</h2>

<input id="noteTitle" placeholder="Title">
<textarea id="noteText" placeholder="Write note..."></textarea>
<button onclick="addNote()">Save Note</button>

<div id="notes"></div>

<hr>

<!-- FILE UPLOAD -->
<h2>📂 Upload PDF</h2>
<input type="file" id="fileInput" accept=".pdf">
<button onclick="processFile()">Generate</button>

<div id="output"></div>

<h3>📊 Score: <span id="score">0</span></h3>

<button onclick="saveGeneratedNotes()">💾 Save Notes</button>
<button onclick="downloadGeneratedPDF()">📄 Download PDF</button>

</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs/dist/pptxgen.min.js"></script>

</body>
</html>
